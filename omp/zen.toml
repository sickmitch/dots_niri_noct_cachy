console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 3
final_space = true

[secondary_prompt]
  template = '❯ '
  foreground = '#6ed2ff'
  background = 'transparent'

[transient_prompt]
  template = '❯ '
  background = 'transparent'
  foreground_templates = [
    '{{if gt .Code 0}}#ffb4ab{{end}}',
    '{{if eq .Code 0}}#6ed2ff{{end}}'
  ]

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    template = '{{ .Path }}'
    foreground = '#6ed2ff'
    background = 'transparent'

    [blocks.segments.properties]
      style = 'full'

  [[blocks.segments]]
    type = 'git'
    style = 'plain'
    template = ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }} 󰚰{{ end }} <#b4cad6>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'
    foreground = '#006686'
    background = 'transparent'

    [blocks.segments.properties]
      branch_icon = ''
      commit_icon = '@'
      fetch_status = true

[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    template = '{{ .FormattedMs }}'
    foreground = '#c7c2ea'
    background = 'transparent'

    [blocks.segments.properties]
      threshold = 5000

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    template = ' {{ if gt .Code 0 }}✗ {{ else }}󰜴 {{ end }}'
    background = 'transparent'
    foreground_templates = [
      '{{if gt .Code 0}}#ffb4ab{{end}}',
      '{{if eq .Code 0}}#6ed2ff{{end}}'
    ]

